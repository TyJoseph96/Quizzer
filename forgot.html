<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Details — Quizer 🎮</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="nav">
        <ul>
            <a href="Home.html" class="nav-logo">QUIZER</a>
            <li><a href="Home.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-box">

            <h1 class="auth-title">Forgot Details?</h1>
            <p class="auth-subtitle">Enter your email and we'll help you out</p>

            <div class="auth-error"   id="error-message"></div>
            <div class="auth-success" id="success-message"></div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email"
                    placeholder="Enter your email"/>
            </div>

            <!-- Two buttons — one for each recovery type -->
            <button class="auth-btn" onclick="recover('username')">
                Recover Username 👤
            </button>

            <button class="auth-btn"
                    style="background-color:#2d2d44; margin-top:10px;"
                    onclick="recover('password')">
                Reset Password 🔑
            </button>

            <p class="auth-switch">
                Remember your details?
                <a href="login.html">Login here</a>
            </p>

        </div>
    </div>

    <script>

        async function recover(type) {

            const email = document.getElementById("email").value.trim();

            showError("");
            showSuccess("");

            if (!email) {
                showError("Please enter your email address");
                return;
            }

            try {

                const response = await fetch(
                    "http://localhost:3000/api/auth/forgot",
                    {
                        method:  "POST",
                        headers: { "Content-Type": "application/json" },
                        body:    JSON.stringify({ email, type })
                    }
                );

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data.message);
                } else {
                    showError(data.message);
                }

            } catch (error) {
                showError("Cannot connect to server. Is it running?");
            }

        }

        function showError(message) {
            const el         = document.getElementById("error-message");
            el.textContent   = message;
            el.style.display = message ? "block" : "none";
        }

        function showSuccess(message) {
            const el         = document.getElementById("success-message");
            el.textContent   = message;
            el.style.display = message ? "block" : "none";
        }

    </script>

</body>
</html>
