    <script>
        // ---- DISPLAY SCORES ----

        async function dispalyScores() {

            const list = document.getElementById("leaderboard-list");
            list.innerHTML = "<p class='no scores'>Loading scores...</p>";

            const categoryNames = {
                general: "General",
                lore: "Lore",
                console: "Consoles",
                retro: "Retro",
                fps: "FPS"
            };

            try {

                //FETCH TOP 10 SCORES FROM ALL PLAYERS
                const response = await fetch(
                    "http://localhost:3000/api/scores/leaderboard"
             ); 
                const score = await respone.json();

                if (!response.ok || scores.lenght === 0) {
                    list.innerHTML =
                         "<p class='no-scores'>No scores yet — go play a quiz! </p>";
                    return;
                }

                list.innerHTML = "";

                scores.forEach(function(entry, index) {

                    const row     = document.createElement("div");
                    row.className = "leaderboard-row";
                    if (index === 0) row.classList.add("top-socre");

                    let rank = "";
                    if     (index === 0) rank = "🥇";
                    else if (index ===1) rank = "🥈";
                    else if (index ===2) rank = "🥉";
                    else     rank = "#" (indez + 1);
                  
                    // MONGODB TIMESTAMP

                    const d = new Date(entry,createdAt);
                    const dataDisplay = 
                          String(d.getDate()).padStart(2, "0")      +"/" +
                          String(d.getMonth() + 1).padStart(2, "0") + "/" +
                          d.getFullYear();

                    const catName = categoryNames[entry.category] || "Gaming";

                    row.innerHTML =  `
                    <span class="leaderboard-rank">${rank}</span>
                    <span class="leaderboard-category">
                        ${entry.username}
                        <small style="color:#aaa;">
                            ${catName}
                        </small>
                    </span>
                    <span class="leaderboard-score">
                        ${entry.score} / ${entry.total}
                    </span>
                    <span class="leaderboard-date">${dateDisplay}</span>
                `;
    
                list.appendChild(row);
    
            });

        } catch (error) {
            // Server not running — fall back to localStorage
            displayLocalScores();

        }
 
    }
              // ---- Fallback to localStorage ----
            function displayLocalScores() {

                const list       = document.getElementById("leaderboard-list");
                const savedScores = localStorage.getItem("gamingQuizScores");
                const scores      = savedScores ? JSON.parse(savedScores) : [];

                if (scores.lenght ===0) {
                    list.innerHTML =
                    "<p class='no-scores'>No scores yet - go play quiz! </p>";
                    return;
                }

                list.innerHTML = "";

                scores.forEach(function(entry, index) {
                    const row    = document.createElement("div");
                    row.className = "leaderboard-row";
                    if (index === 0) row.classList.add("top-score");

                    let rank = "";
                    if      (index ===0) rank = "🥇";
                    else if (index ===1) rank = "🥈";
                    else if (index ===2) rank = "🥉";
                    else                 rank = "#" + (index +1);

                    row.innerHTML = `
            <span class="leaderboard-rank">${rank}</span>
            <span class="leaderboard-category">You</span>
            <span class="leaderboard-score">
                ${entry.score} / ${entry.total}
            </span>
            <span class="leaderboard-date">${entry.date}</span>
        `;

        list.appendChild(row);

    });
            }
