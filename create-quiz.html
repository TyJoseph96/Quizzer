<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz — Quizer 🎮</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="nav">
        <ul>
            <a href="Home.html" class="nav-logo">QUIZER</a>
            <li><a href="Home.html">Home</a></li>
            <li class="dropdown">
                <a href="Games.html" class="active">Games</a>
                <div class="dropdown-content">
                    <a href="Games.html">All Categories</a>
                    <a href="quizs.html">Play Quiz</a>
                    <a href="create-quiz.html">Create Quiz</a>
                </div>
            </li>
            <li><a href="Leaderboard.html">Leaderboard</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <div class="page-container">

        <h1 class="page-title">Create a Quiz 🎮</h1>
        <p class="page-subtitle">Build your own quiz for others to play!</p>

        <!-- ERROR AND SUCCESS MESSAGES -->
        <div class="auth-error"   id="error-message"></div>
        <div class="auth-success" id="success-message"></div>

        <!-- QUIZ DETAILS -->
        <div class="quiz-builder">

            <div class="form-group">
                <label>Quiz Title</label>
                <input type="text" id="quiz-title"
                    placeholder="e.g. Ultimate Pokemon Quiz"
                    maxlength="50"/>
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" id="quiz-description"
                    placeholder="Brief description of your quiz"
                    maxlength="200"/>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="quiz-category">
                    <option value="gaming">🎮 Gaming</option>
                    <option value="movies">🎬 Movies</option>
                    <option value="music">🎵 Music</option>
                    <option value="sports">⚽ Sports</option>
                    <option value="science">🔬 Science</option>
                    <option value="history">📚 History</option>
                    <option value="other">🌍 Other</option>
                </select>
            </div>

            <!-- QUESTIONS SECTION -->
            <div class="questions-builder">
                <h2 class="builder-title">Questions</h2>
                <p class="builder-subtitle">
                    Add at least 3 questions. Each needs 4 answers
                    and one correct answer marked.
                </p>

                <!-- questions added here by JavaScript -->
                <div id="questions-container"></div>

                <!-- ADD QUESTION BUTTON -->
                <button class="add-question-btn" onclick="addQuestion()">
                    + Add Question
                </button>

            </div>

            <!-- SUBMIT BUTTON -->
            <button class="auth-btn" id="submit-btn" onclick="submitQuiz()">
                Publish Quiz 🚀
            </button>

        </div>

    </div>
    <script>
    
        let questionCount = 0;

function addQuestion() {
    
    questionCount++;

    const container = document.getElementById("questions-container");
    const block     = document.createElement("div");

    block.id        = "question-" + questionCount;
    block.className = "question-block";

    block.innerHTML = `
        <div class="question-block-header">
            <h3>Question ${questionCount}</h3>
            <button class="remove-question-btn" 
                onclick="removeQuestion(${questionCount})">
                Remove
            </button>
        </div>

        <div class="form-group">
            <input type="text" 
                   class="question-text" 
                   placeholder="Enter question text" 
                   maxlength="100"/>
        </div>

        <div class="answers-input-row">
            <input type="radio" name="correct-${questionCount}" value="0">
            <input type="text" class="answer-text" 
                   placeholder="Answer 1" maxlength="100">
        </div>

        <div class="answers-input-row">
            <input type="radio" name="correct-${questionCount}" value="1">
            <input type="text" class="answer-text" 
                   placeholder="Answer 2" maxlength="100">
        </div>

        <div class="answers-input-row">
            <input type="radio" name="correct-${questionCount}" value="2">
            <input type="text" class="answer-text" 
                   placeholder="Answer 3" maxlength="100">
        </div>

        <div class="answers-input-row">
            <input type="radio" name="correct-${questionCount}" value="3">
            <input type="text" class="answer-text" 
                   placeholder="Answer 4" maxlength="100">
        </div>
    `;

    container.appendChild(block);
}


function removeQuestion(id) {
    const block = document.getElementById("question-" + id);
    if (block) {
        block.remove();
    }
}


async function submitQuiz() {

    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    const title       = document.getElementById("quiz-title").value.trim();
    const description = document.getElementById("quiz-description").value.trim();
    const category    = document.getElementById("quiz-category").value;

    if (!title) {
        showError("Quiz title is required");
        return;
    }

    // ---- COLLECT QUESTIONS ----
    const questions = [];
    const blocks    = document.querySelectorAll(".question-block");

    for (let i = 0; i < blocks.length; i++) {

        const block        = blocks[i];
        const questionText = block.querySelector(".question-text").value.trim();

        if (!questionText) {
            showError("Question " + (i + 1) + " text is required");
            return;
        }

        const answerInputs = block.querySelectorAll(".answer-text");
        const answers      = [];

        for (let a = 0; a < answerInputs.length; a++) {
            if (!answerInputs[a].value.trim()) {
                showError("Question " + (i + 1) + " has an empty answer");
                return;
            }
            answers.push(answerInputs[a].value.trim());
        }

        const checkedRadio = block.querySelector("input[type='radio']:checked");

        if (!checkedRadio) {
            showError("Question " + (i + 1) + " needs a correct answer marked");
            return;
        }

        const correctAnswer = parseInt(checkedRadio.value);

        questions.push({
            question:      questionText,
            answers:       answers,
            correctAnswer: correctAnswer
        });

    }
    // ---- END OF FOR LOOP ----

    if (questions.length < 3) {
        showError("Please add at least 3 questions");
        return;
    }

    // ---- SEND TO BACKEND ----
    try {

        const response = await fetch(
            "http://localhost:3000/api/quizzes/create",
            {
                method:  "POST",
                headers: {
                    "Content-Type":  "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    title,
                    description,
                    category,
                    questions
                })
            }
        );

        const data = await response.json();

        if (response.ok) {
            showSuccess("Quiz published successfully!");
            setTimeout(function() {
                window.location.href = "Games.html";
            }, 2000);
        } else {
            showError(data.message || "An error occurred");
        }

    } catch (error) {
        showError("Cannot connect to server. Is it running?");
    }

}
// ---- END OF submitQuiz ----


function showError(message) {
    const el         = document.getElementById("error-message");
    el.textContent   = message;
    el.style.display = message ? "block" : "none";
}

function showSuccess(message) {
    const el         = document.getElementById("success-message");
    el.textContent   = message;
    el.style.display = message ? "block" : "none";
}

window.onload = function() {
    if (!localStorage.getItem("token")) {
        alert("You must be logged in to create a quiz!");
        window.location.href = "login.html";
        return;
    }
    addQuestion();
    loadCommunityQuizzes();  // existing code

    // ADD THIS BELOW existing code
    const username = localStorage.getItem("username");
    const token    = localStorage.getItem("token");

    if (username && token) {
        const nav    = document.querySelector(".nav ul");
        const li     = document.createElement("li");
        li.innerHTML = `
            <a href="profile.html?username=${username}">
                👾 ${username}
            </a>
        `;
        nav.appendChild(li);
    }
};
            
    </script>
